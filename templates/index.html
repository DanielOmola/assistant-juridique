<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Juridique IA - Workflow</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🤖 Assistant Juridique IA</h1>
            <p>Workflow intelligent pour avocats</p>
        </header>

        <div class="layout">
            <!-- SIDEBAR : Configuration et document source -->
            <aside class="sidebar">
                <h3>⚙️ Configuration IA</h3>
                <hr>
                
                <label>Provider:</label>
<select id="provider_select" onchange="loadModelsForProviderSelect()">
    <option value="">Chargement...</option>
</select>
                
                <label>Modèle IA:</label>
                <select id="model_select" disabled>
                    <option value="">-- Sélectionnez d'abord un provider --</option>
                </select>
                
                <label>Température: <span id="temp_value">0.5</span></label>
                <input type="range" id="temperature" min="0" max="1" step="0.05" value="0.3">
                
                <label>Tokens max: <span id="tokens_value">4000</span></label>
                <input type="range" id="max_tokens" min="500" max="8000" step="500" value="4000">
                
                <button id="initBtn">🚀 Initialiser</button>
                <div id="init_status"></div>
                
                <hr>
                
                <h3>📄 Document source</h3>
                <input type="file" id="file_upload" accept=".txt,.pdf,.docx">
                <textarea id="direct_text" rows="4" placeholder="Ou collez votre texte ici..."></textarea>
                <button id="loadDocBtn">✅ Valider</button>
                <div id="doc_status"></div>
                
                <hr>
                
                <button id="quitBtn" class="danger">❌ Quitter</button>
            </aside>

            <!-- MAIN : Workflow unique -->
            <main class="content">
                <div class="workflow-container">
                    <div class="workflow-header">
                        <h2>🧠 Flux de travail juridique</h2>

                            <!-- NOUVEAU SÉLECTEUR DE CONTEXTE -->
    <div class="context-mode-selector">
        <label>📎 Mode contexte :</label>
        <select id="contextMode">
            <option value="full">📚 Contexte complet (tous les résultats)</option>
            <option value="last">📌 Dernier résultat uniquement</option>
        </select>
    </div>
    
                        <div class="workflow-actions">
                            <button id="executeAllBtn" class="success">🔄 Exécuter tout</button>
                            <button id="saveWorkflowBtn">💾 Sauvegarder</button>
                            <button id="loadWorkflowBtn">📂 Charger</button>
                        </div>
                    </div>
                    
                    <!-- État du dossier -->
                    <div class="dossier-info">
                        <span>📁 Dossier actif: <strong id="dossier_name">Aucun document chargé</strong></span>
                    </div>
                    
                    <!-- Liste des étapes du workflow -->
                    <div id="workflow-steps" class="workflow-steps">
                        <!-- Les étapes sont ajoutées dynamiquement -->
                        <div class="empty-workflow">
                            <p>✨ Aucune étape dans votre workflow</p>
                            <p>Cliquez sur <strong>+ Ajouter une étape</strong> pour commencer</p>
                        </div>
                    </div>
                    
                    <!-- Ajouter une nouvelle étape -->
                    <div class="add-step">
                        <select id="step_type_select">
                            <option value="analyse">🔍 Analyser le document</option>
                            <option value="conclusions">⚖️ Générer des conclusions</option>
                            <option value="ameliorer">✨ Améliorer le document</option>
                            <option value="email">📧 Générer un email</option>
                            <option value="rediger">📜 Rédiger un acte juridique</option>
                            <option value="recherche">🔍 Recherche juridique</option>
                            <option value="preparer_audience">⚖️ Préparer audience</option>
                            <option value="generer_arguments">🧠 Générer arguments</option>
                            <option value="generer_prompt">🎯 Générer prompt</option>
                            <option value="appliquer_tampon">🖊️ Appliquer tampon</option>
                        </select>
                        <button id="addStepBtn" class="success">➕ Ajouter cette étape</button>
                    </div>
                </div>
                
                <!-- Modal pour configurer une étape -->
                <div id="stepModal" class="modal">
                    <div class="modal-content">
                        <span class="close" onclick="closeStepModal()">&times;</span>
                        <h3 id="modal_title">Configurer l'étape</h3>
                        <div id="modal_fields"></div>
                        <button onclick="saveStepConfig()" class="success">✅ Valider</button>
                        <button onclick="closeStepModal()">Annuler</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
