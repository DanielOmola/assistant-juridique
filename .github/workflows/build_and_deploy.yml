name: Build and Deploy Wheels

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Optional: force Node.js 24 now

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build wheels for Colab
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.11'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build wheel
    
    - name: Build wheel
      run: |
        python -m build --wheel
    
    - name: Get wheel filename
      id: wheel
      run: |
        cd dist
        echo "filename=$(ls *.whl)" >> $GITHUB_OUTPUT
        echo "path=dist/$(ls *.whl)" >> $GITHUB_OUTPUT
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4.6.2
      with:
        name: wheels-${{ github.sha }}
        path: dist/*.whl
        retention-days: 7
    
    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.wheel.outputs.path }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Prepare GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        mkdir -p pages
        cp dist/*.whl pages/
        [ -f "requirements.txt" ] && cp requirements.txt pages/
        cd pages
        cat > index.html << 'EOF'
        <html><body>
        <h2>Wheels</h2>
        EOF
        for f in *.whl; do
          echo "<a href=\"$f\">$f</a><br>" >> index.html
        done
        [ -f "requirements.txt" ] && echo "<h2>Requirements</h2><a href=\"requirements.txt\">requirements.txt</a><br>" >> index.html
        echo "</body></html>" >> index.html
    
    - name: Upload to GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: actions/upload-pages-artifact@v3.0.1
      with:
        path: pages/

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5