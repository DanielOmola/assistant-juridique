name: Build and Deploy Wheels

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build wheels for Colab
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Build wheel
        run: |
          python -m build --wheel

      - name: List dist directory
        run: |
          ls -la dist/

      - name: Get wheel filename
        id: wheel
        run: |
          cd dist
          echo "filename=$(ls *.whl)" >> $GITHUB_OUTPUT
          echo "path=dist/$(ls *.whl)" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.wheel.outputs.path }}
          generate_release_notes: false
          body: |
            ## 🚀 Release ${{ github.ref_name }}

            ### 📦 Wheel file included for Google Colab

            Installation:
            ```python
            !pip install https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.wheel.outputs.filename }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}