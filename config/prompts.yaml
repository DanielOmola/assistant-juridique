
prompt_basic:
  description: |
    Prompt généraliste : synthèse de la description, cas d'usage,..., points de vigilance.
  text: |
    Mon client a signé un contrat de location en janvier 2022.
    Depuis mars 2023, il ne paie plus ses loyers.
    Le propriétaire souhaite engager une procédure pour récupérer les loyers impayés et résilier le bail.
  prompt: |
    Description : {{ text }}
    
    Tu dois produire une réponse contenant STRICTEMENT les 6 sections suivantes, dans cet ordre, sans en omettre aucune :

    1. SYNTHÈSE (max 10 lignes)
    2. CAS D'USAGE (tableau 2 colonnes, 5 lignes max)
    3. LANGAGE COURANT (max 5 lignes, pour non-juriste)
    4. QUESTIONS ASSOCIÉES (3 questions, CHACUNE avec sa réponse en 1-2 lignes)
    5. FONDEMENTS JURIDIQUES (liste à puces séparant : textes / jurisprudence / accords collectifs)
    6. POINTS DE VIGILANCE (liste à puces, 7 points max)

    Ne termine pas ta réponse avant la section 6. Ne supprime aucune section.



prompt_jurisprudence:
  description: |
    Prompt d'aide à la recherche de jurisprudence.
  text: |
    Mon client a signé un contrat de location en janvier 2022.
    Depuis mars 2023, il ne paie plus ses loyers.
    Le propriétaire souhaite engager une procédure pour récupérer les loyers impayés et résilier le bail.
  prompt: |                
    Description : {{ text }}

    Tu dois produire une réponse contenant STRICTEMENT les 6 sections suivantes, dans cet ordre, sans en omettre aucune :

    1. SYNTHÈSE JURISPRUDENTIELLE (max 10 lignes)
      - Dégage la position majoritaire de la Cour de cassation (ou du juge administratif) sur la question posée.
      - Mentionne les évolutions récentes ou les revirements éventuels.
      - Cite les arrêts de principe (nom, date, numéro).

    2. TABLEAU DES SOLUTIONS PAR JURIDICTION (5 lignes max, 2 colonnes)
      Colonne 1 : Niveau de juridiction / situation
      Colonne 2 : Solution dégagée
      Exemples : 
      | Cour de cassation (Chambre sociale) | Solution retenue |
      | Cour d’appel (tendance majoritaire) | Solution fréquente |
      | Conseil d’État (contentieux social) | Position actuelle |

    3. EXPLICATION POUR LE CLIENT (max 5 lignes, langage courant)
      - Reformule la solution jurisprudentielle comme vous l’expliqueriez à un client non juriste.
      - Indique concrètement ce que cela change pour sa situation.

    4. QUESTIONS JURISPRUDENTIELLES ASSOCIÉES (3 questions, chacune avec sa réponse en 1-2 lignes)
      Exemples :
      - Cette solution est-elle transposable à d’autres situations ?
      - Existe-t-il un arrêt plus récent qui nuance cette position ?
      - Quels sont les critères d’appréciation retenus par les juges ?

    5. FONDEMENTS JURIDIQUES (liste à puces séparant : textes / jurisprudence / accords collectifs)
      - Textes : articles interprétés par la jurisprudence
      - Jurisprudence : liste des arrêts clés (avec numéros et dates) + leur apport
      - Accords collectifs : uniquement si la jurisprudence les commente

    6. POINTS DE VIGILANCE JURISPRUDENTIELS (liste à puces, 7 points max)
      - Conditions d’application non toujours rappelées
      - Risque de revirement
      - Précautions pour la rédaction des conclusions
      - Distinction selon la nature du litige (individuel/collectif)
      - Délais de prescription interprétés par la jurisprudence
      - Charge de la preuve telle qu’aménagée par les juges
      - Incidence éventuelle d’un pourvoi pendant ou d’un arrêt de principe postérieur

    Ne termine pas ta réponse avant la section 6. Ne supprime aucune section.

prompt_dossier:
  description: |
    Prompt d'aide à la préparation de dossier.
  text: |
    Cadre démissionne oct.2024, rétracte nov.2024 pour harcèlement. Acceptation employeur. Mails + attestations.
  prompt: |
    Description : {{ text }}

    8 sections :
    1. FAITS (chrono + zones d'ombre)
    2. QUALIFICATIONS (tableau)
    3. RÉGIME JURIDIQUE
    4. FORCES/FAIBLESSES (tableau)
    5. STRATÉGIE (voie, actes, risques)
    6. CHANCES (favorable/défavorable)
    7. FONDEMENTS (textes/jurisprudence)
    8. CHECKLIST (pièces, actes, délais)

    Toutes sections obligatoires.

recherche_nullites:
  description: |
    Prompt d'aide à la recherche de nullités.
  text: |
    Cadre démissionne oct.2024, rétracte nov.2024 pour harcèlement. Acceptation employeur. Mails + attestations.
  type_nullite: |
    
  prompt: |
    Description : {{ text }}

    Rechercher les cas de nullité.

    8 sections :
    1. FAITS (chronologie + zones d'ombre)
    2. QUALIFICATIONS (tableau : situation / nullité encourue / fondement)
    3. RÉGIME JURIDIQUE (conditions de la nullité, effets, prescription)
    4. FORCES/FAIBLESSES (tableau : pour le salarié / pour l'employeur)
    5. STRATÉGIE (voie contentieuse, actes urgents, risques)
    6. CHANCES (scénario favorable / défavorable / éléments clés)
    7. FONDEMENTS (textes / jurisprudence / accords collectifs)
    8. CHECKLIST (pièces, actes, délais, précautions)

    Toutes sections obligatoires.


redaction_conclusion:
  description: |
    Prompt d'aide à la recherche de nullités.
  text: |
    Cadre démissionne oct.2024, rétracte nov.2024 pour harcèlement. Acceptation employeur. Mails + attestations.
  type_nullite: |
    
  prompt: |
    Description : {{ text }}

    Rédige des CONCLUSIONS JURIDIQUES structurées:
    1. RAPPEL DES FAITS
    2. ANALYSE JURIDIQUE
    3. ARGUMENTS
    4. CONCLUSION ET PRÉCONISATIONS
    Toutes sections obligatoires.